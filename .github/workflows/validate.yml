name: Validate skills

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Structure, denylist, matrix drift, aliases
        run: python3 scripts/skills.py validate

      - name: Generated outputs match source
        run: python3 scripts/skills.py build --check

      - name: Tooling smoke tests
        run: python3 -m unittest discover -s tests -p "test_*.py"
